# SonarCloud automatic-analysis settings.
#
# Pin the Python analysis target to the current (3.14) and prior (3.13)
# releases. Kept as a defensive pin: it keeps the Python version-imprecision
# warning suppressed even if a Python fixture is ever missing from the
# sonar.exclusions list before the pre-commit sync check catches drift.
sonar.python.version=3.13, 3.14
#
# Exclude every tracked input under testing/fixtures — deliberate test
# scaffolding (a Python fixture, intentional lint-/type-error fixtures, sample
# trees), not product code.
#
# Each file is listed by its EXACT path, not a wildcard: SonarCloud automatic
# analysis reads .sonarcloud.properties but does not accept wildcard patterns
# (https://docs.sonarsource.com/sonarqube-cloud/analyzing-source-code/automatic-analysis/).
# Wildcards such as testing/fixtures/** work only in CI-based analysis
# (sonar-project.properties) or the project's UI Analysis Scope settings, not here.
# One path per line via .properties line continuation; regenerate with
# `git ls-files testing/fixtures/` when fixtures change.
sonar.exclusions=testing/fixtures/audit/audit-verdict.xml,\
  testing/fixtures/empty-dir/.gitkeep,\
  testing/fixtures/index.ts,\
  testing/fixtures/markdown/broken-links/docs/guide.md,\
  testing/fixtures/markdown/broken-links/spx/21-sample.outcome/32-child.outcome/child.md,\
  testing/fixtures/markdown/broken-links/spx/21-sample.outcome/43-sibling.outcome/sibling.md,\
  testing/fixtures/markdown/broken-links/spx/21-sample.outcome/sample.md,\
