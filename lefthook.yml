# Lefthook configuration for pre-commit, pre-push, and post-merge/post-rewrite hooks.
# See ADR-021: Lefthook Pre-Commit Test Enforcement
#
# Pre-commit hook runs tests on modified files using the TypeScript
# orchestration script. Uses tsx to run TypeScript directly, ensuring
# the hook always uses the latest source code without needing a build step.
#
# Pre-push hook runs full build + validation + test suite to prevent
# pushing code that hasn't been built or validated.
#
# Post-merge and post-rewrite hooks rebuild dist/ after a pull (merge or
# rebase) so a published or pnpm-linked `spx` (which resolves to ./dist)
# reflects the merged code. They rebuild only in the main worktree; linked
# worktrees are dev checkouts and skip it.

pre-commit:
  parallel: true
  commands:
    tests:
      glob: "*.{ts,tsx,js,jsx}"
      run: env -u GIT_DIR -u GIT_WORK_TREE -u GIT_INDEX_FILE -u GIT_PREFIX -u GIT_COMMON_DIR npx tsx src/lib/precommit/run.ts

pre-push:
  commands:
    build:
      run: env -u GIT_DIR -u GIT_WORK_TREE -u GIT_INDEX_FILE -u GIT_PREFIX -u GIT_COMMON_DIR pnpm run build
    validate:
      run: env -u GIT_DIR -u GIT_WORK_TREE -u GIT_INDEX_FILE -u GIT_PREFIX -u GIT_COMMON_DIR pnpm run validate
    test:
      run: env -u GIT_DIR -u GIT_WORK_TREE -u GIT_INDEX_FILE -u GIT_PREFIX -u GIT_COMMON_DIR pnpm test

post-merge:
  commands:
    # Mirror the canonical isRootWorktree (src/git/root.ts): the root worktree is
    # the one whose Git common dir sits directly under the worktree toplevel.
    # --path-format=absolute makes --git-common-dir absolute regardless of cwd (as
    # GIT_COMMON_DIR_ARGS does), so dirname(common-dir) == --show-toplevel holds
    # only in the main worktree. A --git-common-dir failure (empty $gc) is treated
    # as the root worktree so the rebuild is not silently skipped. Only the main
    # worktree's dist/ feeds the published or pnpm-linked spx. CI=true keeps pnpm
    # non-interactive so a node_modules purge on a pnpm version change proceeds
    # instead of hanging behind lefthook's spinner.
    rebuild-dist:
      run: |
        env -u GIT_DIR -u GIT_WORK_TREE -u GIT_INDEX_FILE -u GIT_PREFIX -u GIT_COMMON_DIR sh -c '
          toplevel=$(git rev-parse --show-toplevel)
          gc=$(git rev-parse --path-format=absolute --git-common-dir 2>/dev/null)
          if [ -n "$gc" ] && [ "$(dirname "$gc")" != "$toplevel" ]; then
            echo "rebuild-dist: skipped (linked worktree, not the main worktree)"
          else
            export CI=true
            pnpm install --frozen-lockfile && pnpm run build
          fi
        '

# git pull --rebase and git rebase fire post-rewrite with "rebase" as the hook
# argument; git commit --amend fires it with "amend". Only a rebased pull
# updates src/, so guard on "rebase" and skip amends. Lefthook forwards the git
# hook argument as {1}, passed into the subshell as $1.
post-rewrite:
  commands:
    rebuild-dist:
      run: |
        env -u GIT_DIR -u GIT_WORK_TREE -u GIT_INDEX_FILE -u GIT_PREFIX -u GIT_COMMON_DIR sh -c '
          [ "$1" = "rebase" ] || { echo "rebuild-dist: skipped ($1, not a rebase)"; exit 0; }
          toplevel=$(git rev-parse --show-toplevel)
          gc=$(git rev-parse --path-format=absolute --git-common-dir 2>/dev/null)
          if [ -n "$gc" ] && [ "$(dirname "$gc")" != "$toplevel" ]; then
            echo "rebuild-dist: skipped (linked worktree, not the main worktree)"
          else
            export CI=true
            pnpm install --frozen-lockfile && pnpm run build
          fi
        ' -- {1}
