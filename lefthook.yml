# Lefthook configuration for pre-commit, pre-push, and post-merge/post-rewrite hooks.
# Keeps local hook behavior aligned with the product's hook machinery.
#
# Pre-commit hook runs tests on modified files using the TypeScript
# orchestration script. Uses tsx to run TypeScript directly, ensuring
# the hook always uses the latest source code without needing a build step.
#
# Pre-push hook runs full build + validation + test suite to prevent
# pushing code that hasn't been built or validated.
#
# Post-merge and post-rewrite hooks rebuild dist/ after a pull (merge or
# rebase) so a published or pnpm-linked `spx` (which resolves to ./dist)
# reflects the merged code. They rebuild only in the main worktree; linked
# worktrees are dev checkouts and skip it.

pre-commit:
  parallel: true
  commands:
    tests:
      glob: "*.{ts,tsx,js,jsx}"
      run: env -u GIT_DIR -u GIT_WORK_TREE -u GIT_INDEX_FILE -u GIT_PREFIX -u GIT_COMMON_DIR npx tsx src/lib/precommit/run.ts
    # Blocks a commit whose .sonarcloud.properties sonar.exclusions list has drifted
    # from the tracked testing/fixtures tree. Fires when the properties file or any
    # fixture changes.
    sonarqube-cloud-exclusions:
      glob: "{.sonarcloud.properties,testing/fixtures/**}"
      run: env -u GIT_DIR -u GIT_WORK_TREE -u GIT_PREFIX -u GIT_COMMON_DIR npx tsx src/lib/sonarqube-cloud/check-fixture-exclusions.ts

pre-push:
  commands:
    build:
      run: env -u GIT_DIR -u GIT_WORK_TREE -u GIT_INDEX_FILE -u GIT_PREFIX -u GIT_COMMON_DIR pnpm run build
    validate:
      run: env -u GIT_DIR -u GIT_WORK_TREE -u GIT_INDEX_FILE -u GIT_PREFIX -u GIT_COMMON_DIR pnpm run validate
    test:
      run: env -u GIT_DIR -u GIT_WORK_TREE -u GIT_INDEX_FILE -u GIT_PREFIX -u GIT_COMMON_DIR pnpm test

post-merge:
  commands:
    # The main-checkout gate (src/lib/precommit/main-checkout-gate.ts) routes the
    # decision through the tested isMainCheckout classifier (src/git/root.ts), so
    # it designates the main checkout correctly in both a non-bare repository and a
    # bare-repository pool. It exits zero in the main checkout, 78 in a non-main
    # checkout, and any other non-zero status for gate failures; an unreadable
    # repository is treated as the main checkout so the rebuild is not silently
    # skipped. Only the main checkout's dist/ feeds the published or pnpm-linked
    # spx. `pnpm install` runs before the gate so the gate's `tsx` resolves even
    # right after a node_modules purge on a pnpm version change (a no-op when deps
    # are current); only the main checkout then rebuilds dist/. CI=true keeps pnpm
    # non-interactive so such a purge proceeds instead of hanging behind lefthook's
    # spinner.
    rebuild-dist:
      run: |
        env -u GIT_DIR -u GIT_WORK_TREE -u GIT_INDEX_FILE -u GIT_PREFIX -u GIT_COMMON_DIR sh -c '
          export CI=true
          pnpm install --frozen-lockfile || exit 1
          pnpm exec tsx src/lib/precommit/main-checkout-gate.ts
          gate_status=$?
          if [ "$gate_status" -eq 0 ]; then
            pnpm run build
          elif [ "$gate_status" -eq 78 ]; then
            echo "rebuild-dist: skipped (non-main checkout)"
          else
            exit "$gate_status"
          fi
        '

# git pull --rebase and git rebase fire post-rewrite with "rebase" as the hook
# argument; git commit --amend fires it with "amend". Only a rebased pull
# updates src/, so guard on "rebase" and skip amends. Lefthook forwards the git
# hook argument as {1}, passed into the subshell as $1.
post-rewrite:
  commands:
    # Same main-checkout gate as post-merge (see above), routed through the tested
    # isMainCheckout classifier (src/git/root.ts via
    # src/lib/precommit/main-checkout-gate.ts).
    rebuild-dist:
      run: |
        env -u GIT_DIR -u GIT_WORK_TREE -u GIT_INDEX_FILE -u GIT_PREFIX -u GIT_COMMON_DIR sh -c '
          [ "$1" = "rebase" ] || { echo "rebuild-dist: skipped ($1, not a rebase)"; exit 0; }
          export CI=true
          pnpm install --frozen-lockfile || exit 1
          pnpm exec tsx src/lib/precommit/main-checkout-gate.ts
          gate_status=$?
          if [ "$gate_status" -eq 0 ]; then
            pnpm run build
          elif [ "$gate_status" -eq 78 ]; then
            echo "rebuild-dist: skipped (non-main checkout)"
          else
            exit "$gate_status"
          fi
        ' -- {1}
