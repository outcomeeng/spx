methodology:
  source: outcomeeng/spec-tree
  version: 0.24.0

validation:
  paths:
    exclude:
      - .work/
  literal:
    values:
      include:
        - --idempotency-key <key>
        - --payload <payload-source>
        - --exclude=
        - "*.test.ts"
        - "*.test.tsx"
        - append-finding
        - append-scope
        - event
        - finding
        - journal
        - node_modules
        - scope
        - skippedTests
        - unmatched
        - unresolvedChangedSourceFiles
        - unresolvedTargets
        - verification
        - verify
