name: Release Publishing

on:
  push:
    tags: ["v*"]

# Deny all permissions by default — grant per-job
permissions: {}

jobs:
  # Release gate: run the full deterministic suite exactly once on the tagged
  # commit. The reusable workflow's build job uploads the verified dist
  # artifact, which the publish job consumes — so publish runs no validation,
  # test, or build of its own. Agentic verification gates earlier, on the pull
  # request that merged this commit to main.
  deterministic:
    uses: ./.github/workflows/deterministic-verification.yml
    permissions:
      contents: read

  publish:
    name: Publish
    needs: deterministic
    # Pinned to a GitHub-hosted runner, deliberately outside the RUNNER_X2 /
    # RUNNER_X4 switch the other workflows use. npm Trusted Publishing accepts
    # cloud-hosted runners only; third-party runners (Blacksmith, self-hosted)
    # register as self-hosted and their OIDC token carries a runner_environment
    # claim npm rejects. The `deterministic` gate above is unconstrained — only
    # the OIDC publish step is. Do not route this job through the variables.
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write # Required for OIDC Trusted Publishing + Sigstore provenance
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Node 24.x required for npm >= 11.5.1 (OIDC Trusted Publishing)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"

      # The verified build from the deterministic gate; never rebuilt here.
      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Check release tag
        run: |
          PKG_VERSION="v$(node -p 'require("./package.json").version')"
          GIT_TAG="${GITHUB_REF#refs/tags/}"
          if [ "$PKG_VERSION" != "$GIT_TAG" ]; then
            echo "::error::Tag $GIT_TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      # --ignore-scripts keeps npm from firing prepublishOnly -> publish:check,
      # which would re-run the entire validate/circular/build/test suite the
      # deterministic gate already ran. Publish only uploads the verified dist.
      - name: Publish with provenance
        run: npm publish --provenance --access public --ignore-scripts
        env:
          # NODE_AUTH_TOKEN must be unset (not empty) for OIDC to activate.
          # setup-node writes .npmrc with ${NODE_AUTH_TOKEN} placeholder;
          # when unset, npm falls through to OIDC.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
