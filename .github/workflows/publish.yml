name: Release Publishing

on:
  push:
    tags: ["v*"]

# Deny all permissions by default — grant per-job
permissions: {}

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write # Required for OIDC Trusted Publishing + Sigstore provenance
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - run: corepack enable

      # Node 24.x required for npm >= 11.5.1 (OIDC Trusted Publishing)
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: "Validation: source"
        run: pnpm run validate

      # Provisions the pytest toolchain so the Python runner's real-tool test runs
      # against real pytest, before the suite step.
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install managed Python
        run: uv python install 3.13

      - name: Provision pytest
        run: |
          uv venv --python 3.13
          uv pip install pytest
          echo "VIRTUAL_ENV=$PWD/.venv" >> "$GITHUB_ENV"
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Testing
        run: pnpm test

      - name: Build packaged CLI
        run: pnpm run build

      - name: "Validation: packaged CLI"
        run: pnpm run validate:published

      - name: Check release tag
        run: |
          PKG_VERSION="v$(node -p 'require("./package.json").version')"
          GIT_TAG="${GITHUB_REF#refs/tags/}"
          if [ "$PKG_VERSION" != "$GIT_TAG" ]; then
            echo "::error::Tag $GIT_TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish with provenance
        run: npm publish --provenance --access public
        env:
          # NODE_AUTH_TOKEN must be unset (not empty) for OIDC to activate.
          # setup-node writes .npmrc with ${NODE_AUTH_TOKEN} placeholder;
          # when unset, npm falls through to OIDC.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
