# Copy this file to .github/workflows/spec-tree-review.yml in your repository
#
# Required setup:
# 1. Add CLAUDE_CODE_OAUTH_TOKEN to repository secrets
# 2. Optionally provide a `REVIEW.md` at the repository root. The
#    spec-tree-review prompt reads it as the finding-classification
#    taxonomy and comment shape; absent the file, the embedded
#    BLOCKING/DEBT/FOLLOW-UP taxonomy is used.

name: Spec Tree Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  spec-tree-review:
    # BETA TESTER: deliberately tracks outcomeeng/gh-actions @main to surface
    # upstream changes early without a per-release follow-up PR. Production
    # callers must SHA-pin per the gh-actions README "Security" section
    # (Documented exception subsection). Renovate cannot advance this
    # reference; that is the point — pin it back to a SHA when this repo
    # graduates to production usage.
    uses: outcomeeng/gh-actions/.github/workflows/spec-tree-review.yml@main
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    # Authorization is automatic: the review runs only when the PR author has
    # admin, maintain, or write permission on this repository (queried via the
    # GitHub API). External contributors are rejected with a clear error.
    #
    # Uncomment and modify to customize. The reusable defaults
    # `concurrency_cancel` to `true`; set it to `false` to let in-flight
    # reviews complete on push.
    # with:
    #   concurrency_cancel: false
    #
    # Wall-clock budget for the Run Claude Code Review step (default 15 in
    # the reusable workflow). Set to a tighter value when running on
    # self-hosted runners so a hung run frees the slot quickly:
    #   timeout_minutes: '5'
    # Or gate it on a repo variable so you can adjust without editing this
    # file (Settings → Secrets and variables → Actions → Variables). The
    # input is typed `string` so quoted forms pass through unchanged:
    #   timeout_minutes: ${{ vars.CLAUDE_REVIEW_TIMEOUT_MINUTES || '15' }}
    # Minimum 1; GitHub Actions silently rejects `0` at runtime.
    #
    # `spec-tree-review.yml` bakes in a REVIEW.md-aware review prompt;
    # `custom_prompt` is deliberately NOT exposed as an input.
    #
    # The baseline allowlist combines `Bash(gh issue|pr ...)` patterns for
    # PR context and comment posting with `Bash(sed:*),Bash(grep:*),
    # Bash(head:*)` for diff chunking. Project plugins are NOT installed by
    # default — most review plugins demand tools (Read, Grep, Glob, git)
    # outside that allowlist, which produces long runs that never post a
    # comment. To opt in:
    #   use_project_plugins: true
    #   append_allow_list: "Read,Grep,Glob,Bash(git:*)"  # widen the allowlist to match
    #
    # To replace the entire baseline allowlist instead of appending:
    #   override_allow_list: "Bash(gh pr view:*),Bash(gh pr comment:*)"
    # WARNING: override_allow_list silently drops the
    # `Bash(sed:*),Bash(grep:*),Bash(head:*)` spec-tree defaults that the
    # baked-in prompt depends on for diff chunking and comment composition.
    # The review will hit permission gates and waste turns. Use
    # append_allow_list unless you have a hard reason to start from zero.
    #
    # To install specific plugins without enabling all of settings.json:
    #   plugin_marketplaces: "acme-corp/plugins"  # marketplace owner/repo entries
    #   extra_plugins: "internal-style@acme-corp" # plugins to install
    #
    # See README "Plugins and marketplaces" for the full rationale.
