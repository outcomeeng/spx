# Copy this file to .github/workflows/spec-tree.yml in your repository
#
# Required setup:
# 1. Add CLAUDE_CODE_OAUTH_TOKEN to repository secrets.
# 2. (Optional) Tune behavior via repo variables in Settings → Secrets and
#    variables → Actions → Variables. See the `with:` block below — every
#    entry reads a `vars.SPEC_TREE_*` value and falls back to the reusable's
#    default when the variable is unset. No edits to this file are needed
#    to change runner, timeout, model, etc.

name: Spec Tree

on:
  issue_comment:
    types: [created, edited]
  pull_request_review_comment:
    types: [created, edited]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  spec-tree:
    # BETA TESTER: deliberately tracks outcomeeng/gh-actions @main to surface
    # upstream changes early without a per-release follow-up PR. Production
    # callers must SHA-pin per the gh-actions README "Security" section
    # (Documented exception subsection). Renovate cannot advance this
    # reference; that is the point — pin it back to a SHA when this repo
    # graduates to production usage.
    uses: outcomeeng/gh-actions/.github/workflows/spec-tree.yml@main
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

    # Authorization is automatic: the workflow accepts any actor with admin,
    # maintain, or write permission on this repository (queried via the GitHub
    # API). External contributors are rejected with a clear error.
    #
    # Every entry below is ACTIVE — the `vars.*` lookup with the fallback
    # after `||` (or the boolean comparison) supplies the value when the
    # variable is unset. Set the variable in Settings → Secrets and variables
    # → Actions → Variables to override; the workflow file does not need to
    # change. One entry deviates from the reusable's documented default on
    # purpose: `runner` reads the org-wide RUNNER_X2 switch and falls back to
    # `ubuntu-latest` rather than the reusable's `ubuntu-slim`.

    with:
      # Runner, shared with every other workflow in this repo via the org-level
      # RUNNER_X2 switch, so a provider outage is a variable flip rather than a
      # pull request. Unset it to fall back to GitHub-hosted `ubuntu-latest`.
      # The reusable takes a single label or a JSON-array string for multi-label
      # selectors, and dispatches on whichever form it receives; it also asserts
      # `gh` and `jq` exist on the image before doing anything else. The
      # reusable's own default is `ubuntu-slim`, which this repo does not use.
      #
      # Security: self-hosted runners must not be used on public repos or repos
      # that accept pull requests or comments from untrusted contributors.
      runner: ${{ vars.RUNNER_X2 || 'ubuntu-latest' }}

      # Mention trigger phrase. Defaults to `@spec-tree`.
      trigger_phrase: ${{ vars.SPEC_TREE_TRIGGER_PHRASE || '@spec-tree' }}

      # Cancel in-progress mention runs when a new mention arrives. Reusable
      # default: true. Set `vars.SPEC_TREE_CONCURRENCY_CANCEL='false'` to let
      # in-flight runs complete; any other value (or unset) preserves cancel.
      concurrency_cancel: ${{ vars.SPEC_TREE_CONCURRENCY_CANCEL != 'false' }}

      # Wall-clock budget (minutes) for the Run Claude Code step. Reusable
      # default: 15. Minimum 1; GitHub Actions silently rejects '0' at
      # runtime. Typed as a string so quoted forms pass through unchanged.
      timeout_minutes: ${{ vars.SPEC_TREE_TIMEOUT_MINUTES || '15' }}

      # Claude model id (e.g. `claude-opus-4-7`). Empty = action default.
      # Folded into claude_args as `--model <id>`.
      model: ${{ vars.SPEC_TREE_MODEL || '' }}

      # Extra Claude Code CLI args appended verbatim. Examples:
      # `--max-turns 20`, `--debug`, `--allowed-tools "Read,Grep,Bash(gh pr:*)"`.
      claude_args: ${{ vars.SPEC_TREE_CLAUDE_ARGS || '' }}

      # Custom prompt to override the action's default behavior. Set
      # `vars.SPEC_TREE_CUSTOM_PROMPT` to a single-line string (multi-line
      # prompts are not well supported by repo vars; edit this file
      # directly for those).
      custom_prompt: ${{ vars.SPEC_TREE_CUSTOM_PROMPT || '' }}

      # Install plugins declared in `.claude/settings.json`. Reusable
      # default: false (plugin skills with ALWAYS-invoke mandates can pull
      # mention runs off-task). Set `vars.SPEC_TREE_USE_PROJECT_PLUGINS='true'`
      # to opt in; requires marketplaces to be registered under
      # `extraKnownMarketplaces`.
      use_project_plugins: ${{ vars.SPEC_TREE_USE_PROJECT_PLUGINS == 'true' }}

      # Stream full per-turn JSON output to the job log. WARNING: may
      # expose secrets in tool outputs. Set `vars.SPEC_TREE_SHOW_FULL_OUTPUT='true'`
      # only when debugging in a non-sensitive context.
      show_full_output: ${{ vars.SPEC_TREE_SHOW_FULL_OUTPUT == 'true' }}

      # Plugin install lists (rarely change per-environment; uncomment and
      # set directly to opt in without using vars):
      # plugin_marketplaces: "acme-corp/plugins"   # marketplace owner/repo entries
      # extra_plugins: "internal-style@acme-corp"  # plugins to install

      # Cloud-provider routing (uncomment all three together):
      # use_bedrock: ${{ vars.SPEC_TREE_USE_BEDROCK == 'true' }}
      # use_vertex: ${{ vars.SPEC_TREE_USE_VERTEX == 'true' }}
      # additional_env: ${{ vars.SPEC_TREE_ADDITIONAL_ENV || '{}' }}
      # Caller is responsible for AWS/GCP auth in the calling workflow (e.g.
      # aws-actions/configure-aws-credentials before this job). See README
      # "Mention workflow inputs" for the full contract.

    # See README "Per-environment overrides via repo variables" for the
    # complete vars.SPEC_TREE_* table and README "Plugins and marketplaces"
    # for the full rationale on plugin installation.
