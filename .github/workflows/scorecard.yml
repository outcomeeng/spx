name: Security Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "0 6 * * 1" # Monday 06:00 UTC
  push:
    branches: [main]

# Deny all permissions by default — grant per-job
permissions: {}

jobs:
  scorecard:
    name: OpenSSF Scorecard
    # Pinned to a GitHub-hosted runner, deliberately outside the RUNNER_X2 /
    # RUNNER_X4 switch. ossf/scorecard-action requires an Ubuntu hosted runner
    # when publish_results is true: it signs the result with the job's OIDC
    # token, and the OpenSSF API rejects tokens minted on self-hosted runners.
    # Do not route this job through the variables.
    runs-on: ubuntu-latest
    permissions:
      security-events: write # Upload SARIF to Security tab
      id-token: write # Sigstore attestation
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: false

      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          sarif_file: results.sarif
